<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIVO — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Lexend:wght@300;400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --fondo:#F6F8F8;
    --superficie:#FFFFFF;
    --niebla:#E4EAEA;
    --grafito:#171A1E;
    --gris:#5C666B;
    --petroleo:#0C7268;
    --petroleo-oscuro:#0A5B53;
    --petroleo-tinte:#E3F2F0;
    --rojo:#C2362F;
    --rojo-tinte:#FAE7E5;
    --exito:#12805C;
    --exito-tinte:#E5F5EC;
    --flash:linear-gradient(90deg,#2FD9A8 0%,#4BB8D8 50%,#7C6CF0 100%);
    --radio:12px;
    --sombra:0 1px 2px rgba(23,26,30,.05),0 4px 16px rgba(23,26,30,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Lexend',sans-serif;
    background:var(--fondo);
    color:var(--grafito);
    min-height:100vh;
    display:grid;place-items:center;
    padding:24px;
  }
  :focus-visible{outline:none;box-shadow:0 0 0 2px var(--superficie),0 0 0 4px var(--petroleo)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  .tarjeta{
    background:var(--superficie);
    border:1px solid var(--niebla);
    border-radius:var(--radio);
    box-shadow:var(--sombra);
    width:100%;max-width:420px;
    padding:40px 36px 32px;
    text-align:center;
  }
  .lente{
    width:52px;height:52px;border-radius:50%;
    background:conic-gradient(from 210deg,#2FD9A8,#4BB8D8,#7C6CF0,#2FD9A8);
    display:grid;place-items:center;margin:0 auto 18px;
  }
  .lente::after{
    content:'';width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 35% 32%,#2A3138 0%,#171A1E 60%);
  }
  .wordmark{
    font-family:'Archivo',sans-serif;
    font-variation-settings:'wdth' 122,'wght' 800;
    font-size:2rem;letter-spacing:.04em;line-height:1;
  }
  .wordmark small{
    display:block;font-family:'Lexend';font-weight:400;
    font-size:.62rem;letter-spacing:.16em;color:var(--gris);
    text-transform:uppercase;margin-top:6px;font-variation-settings:normal;
  }
  .descripcion{font-size:.85rem;color:var(--gris);margin:18px 0 26px;line-height:1.5}

  .boton-google{
    display:inline-flex;align-items:center;justify-content:center;gap:11px;
    width:100%;padding:13px 20px;
    background:var(--petroleo);color:#fff;
    border:none;border-radius:10px;cursor:pointer;
    font-family:'Lexend';font-size:.92rem;font-weight:600;
    transition:background .15s;
  }
  .boton-google:hover{background:var(--petroleo-oscuro)}
  .boton-google svg{width:19px;height:19px;flex-shrink:0}
  .boton-google .g-fondo{fill:#fff}

  .estado{margin-top:22px;font-size:.8rem;color:var(--gris);min-height:1.2em}
  .estado.error{color:var(--rojo)}

  /* panel de sesión */
  .sesion{display:none;text-align:left;margin-top:26px;border-top:1px solid var(--niebla);padding-top:22px}
  .sesion.visible{display:block}
  .sesion h2{font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gris);margin-bottom:14px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gris);margin-bottom:4px}
  .campo .valor{
    font-family:'Spline Sans Mono',monospace;font-size:.82rem;
    background:var(--fondo);border:1px solid var(--niebla);border-radius:8px;
    padding:9px 11px;word-break:break-all;
  }
  .campo .valor.destacado{
    background:var(--petroleo-tinte);border-color:var(--petroleo);
    font-weight:600;
  }
  .boton-copiar{
    display:inline-flex;align-items:center;gap:7px;
    margin-top:6px;padding:8px 14px;
    background:var(--superficie);color:var(--petroleo);
    border:1px solid var(--petroleo);border-radius:8px;cursor:pointer;
    font-family:'Lexend';font-size:.78rem;font-weight:600;
    transition:background .15s;
  }
  .boton-copiar:hover{background:var(--petroleo-tinte)}
  .boton-copiar.copiado{background:var(--exito-tinte);color:var(--exito);border-color:var(--exito)}
  .boton-salir{
    display:block;width:100%;margin-top:18px;padding:10px;
    background:var(--superficie);color:var(--gris);
    border:1px solid var(--niebla);border-radius:8px;cursor:pointer;
    font-family:'Lexend';font-size:.8rem;font-weight:500;
    transition:border-color .15s,color .15s;
  }
  .boton-salir:hover{border-color:var(--gris);color:var(--grafito)}

  .pie{margin-top:26px;font-size:.66rem;color:var(--gris)}
</style>
</head>
<body>

<main class="tarjeta">
  <div class="lente" aria-hidden="true"></div>
  <h1 class="wordmark">SIVO<small>Visión Óptica Integral</small></h1>
  <p class="descripcion">Página de verificación de acceso.<br>Inicia sesión para obtener tu identificador de usuario (UID).</p>

  <button class="boton-google" id="btnEntrar">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path class="g-fondo" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path class="g-fondo" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path class="g-fondo" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18A10.96 10.96 0 0 0 1 12c0 1.77.43 3.45 1.18 4.94l3.66-2.84z"/><path class="g-fondo" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
    Entrar con Google
  </button>

  <p class="estado" id="estado" role="status"></p>

  <section class="sesion" id="sesion" aria-label="Datos de la sesión">
    <h2>Sesión iniciada</h2>
    <div class="campo">
      <label for="valNombre">Nombre</label>
      <div class="valor" id="valNombre"></div>
    </div>
    <div class="campo">
      <label for="valCorreo">Correo</label>
      <div class="valor" id="valCorreo"></div>
    </div>
    <div class="campo">
      <label for="valUid">UID — este es el dato que necesitamos</label>
      <div class="valor destacado" id="valUid"></div>
      <button class="boton-copiar" id="btnCopiar">Copiar UID</button>
    </div>
    <button class="boton-salir" id="btnSalir">Cerrar sesión</button>
  </section>

  <p class="pie">Ópticas D-Velez · Desarrollado por <strong>TourLat</strong></p>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdUihN1s_SqdKEJAoobOkOjQmVVk0foyQ",
    authDomain: "sivo-dvelez.firebaseapp.com",
    projectId: "sivo-dvelez",
    storageBucket: "sivo-dvelez.firebasestorage.app",
    messagingSenderId: "686206424202",
    appId: "1:686206424202:web:e6fc32b40c7183ea108973"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const proveedor = new GoogleAuthProvider();

  const btnEntrar = document.getElementById('btnEntrar');
  const btnSalir  = document.getElementById('btnSalir');
  const btnCopiar = document.getElementById('btnCopiar');
  const estado    = document.getElementById('estado');
  const sesion    = document.getElementById('sesion');

  btnEntrar.addEventListener('click', async () => {
    estado.textContent = 'Abriendo ventana de Google…';
    estado.classList.remove('error');
    try {
      await signInWithPopup(auth, proveedor);
    } catch (e) {
      estado.classList.add('error');
      if (e.code === 'auth/popup-closed-by-user') {
        estado.textContent = 'Ventana cerrada antes de completar el acceso. Intenta de nuevo.';
      } else if (e.code === 'auth/unauthorized-domain') {
        estado.textContent = 'Este dominio no está autorizado en Firebase Authentication. Hay que agregarlo en Configuración → Dominios autorizados.';
      } else {
        estado.textContent = 'No se pudo iniciar sesión (' + e.code + ').';
      }
    }
  });

  btnSalir.addEventListener('click', () => signOut(auth));

  btnCopiar.addEventListener('click', async () => {
    const uid = document.getElementById('valUid').textContent;
    try {
      await navigator.clipboard.writeText(uid);
      btnCopiar.textContent = 'UID copiado ✓';
      btnCopiar.classList.add('copiado');
      setTimeout(() => {
        btnCopiar.textContent = 'Copiar UID';
        btnCopiar.classList.remove('copiado');
      }, 2500);
    } catch {
      estado.textContent = 'No se pudo copiar automáticamente — selecciona el UID y cópialo manualmente.';
    }
  });

  onAuthStateChanged(auth, (usuario) => {
    if (usuario) {
      document.getElementById('valNombre').textContent = usuario.displayName || '—';
      document.getElementById('valCorreo').textContent = usuario.email || '—';
      document.getElementById('valUid').textContent = usuario.uid;
      sesion.classList.add('visible');
      btnEntrar.style.display = 'none';
      estado.textContent = '';
    } else {
      sesion.classList.remove('visible');
      btnEntrar.style.display = '';
    }
  });
</script>

</body>
</html>
